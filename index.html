<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <section>
    <div class="infos">
      <div class="info">High Score: <span id="high-score">0</span></div>
      <div class="info">Score: <span id="score">0</span></div>
      <div class="info">Time: <span id="time">00-00</span></div>
    </div>
    <div class="board">
      <div class="modal start-game">
        <h1>Welcome to Snake Game</h1>
        <button class="btn" id="start-button">Start Game</button>
      </div>
      <div class="modal game-over hidden">
        <h1>Game Over!</h1>
        <button class="btn" id="restart-button">Restart Game</button>
      </div>
    </div>

  </section>

  <script src="script.js"></script>
</body>

</html>
